<div class="container mt-4">

<div class="row">

<div class="col-md-4 mb-4" *ngFor="let game of games">

<div class="card shadow">

<img
[src]="game.imagenUrl"
class="card-img-top"
style="height:350px;object-fit:cover"
>

<div class="card-body">

<h5>{{game.nombre}}</h5>

<p>Genero: {{game.genero}}</p>

<p>Precio: ${{game.precio}}</p>

</div>

</div>

</div>

</div>

</div>
