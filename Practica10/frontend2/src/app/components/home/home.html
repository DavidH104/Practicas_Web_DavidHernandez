<div class="row">
  <div class="col-md-4 mb-4" *ngFor="let game of games">
    <div class="card h-100 shadow">
      <img [src]="game.imagenUrl"
           class="card-img-top"
           style="height:300px; object-fit:cover;">
      <div class="card-body">
        <h5>{{game.nombre}}</h5>
        <p><strong>Género:</strong> {{game.genero}}</p>
        <p><strong>Precio:</strong> ${{game.precio}}</p>
      </div>
    </div>
  </div>
</div>
